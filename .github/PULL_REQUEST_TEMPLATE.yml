name: Pull Request
description: Submit changes to the project
title: '[PR] '
labels: ['pull request']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 📤 Pull Request

        Thank you for submitting a pull request! Please fill out this form to help us review your changes.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what your PR does
      placeholder: Briefly describe your changes...
    validations:
      required: true

  - type: textarea
    id: type
    attributes:
      label: Type of Change
      description: What type of change does this PR introduce?
      placeholder: |
        - [ ] Bug fix
        - [ ] New feature
        - [ ] Breaking change
        - [ ] Documentation update
        - [ ] Refactoring
        - [ ] Testing
        - [ ] Build/CI update
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: Related Issues
      description: List any related issues (e.g., "Fixes #123")
      placeholder: "e.g., Fixes #123, Related to #456"

  - type: textarea
    id: testing
    attributes:
      label: Testing Performed
      description: Describe the testing you've done
      placeholder: |
        - Unit tests added/updated
        - Manual testing performed
        - Tested on [browsers/devices]
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      description: Confirm the following
      placeholder: |
        - [ ] Code follows the style guidelines
        - [ ] Self-review performed
        - [ ] Documentation updated (if needed)
        - [ ] No new warnings/errors
        - [ ] Tests pass locally
        - [ ] Branch is up to date with main

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If your PR includes UI changes, add screenshots
      placeholder: Drag and drop or paste images here

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any other information reviewers should know
      placeholder: Additional notes...
