name: 💡 Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 💡 Feature Request

        Have an idea to improve MindMirror? We'd love to hear it!

        **Before submitting**: Search existing issues and pull requests to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: 🎯 Problem or Motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: Describe the problem or motivation...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: Describe the solution you'd like. How should it work?
      placeholder: Describe your proposed solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: Any alternative solutions you've considered?
      placeholder: Alternatives...

  - type: textarea
    id: mockups
    attributes:
      label: 📊 Mockups / Examples
      description: Any mockups, wireframes, or examples?

  - type: textarea
    id: context
    attributes:
      label: 📝 Additional Context
      description: Any other context about this feature request.
